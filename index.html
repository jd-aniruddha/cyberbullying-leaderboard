<!DOCTYPE html>
<html>
<head>
    <title>Diabetes Risk Predictor</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
        }

        input {
            margin: 8px;
            padding: 10px;
            width: 200px;
        }

        button {
            padding: 10px 20px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h1>🏥 Diabetes Risk Predictor</h1>

<input type="number" id="age" placeholder="Age"><br>
<input type="number" id="bmi" placeholder="BMI"><br>
<input type="number" id="glucose" placeholder="Glucose"><br>
<input type="number" id="bp" placeholder="Blood Pressure"><br>

<button onclick="predict()">Predict</button>

<div id="result"></div>

<script>
function predict() {

    let age = document.getElementById("age").value;
    let bmi = document.getElementById("bmi").value;
    let glucose = document.getElementById("glucose").value;
    let bp = document.getElementById("bp").value;

    // ⚠️ Validation
    if (!age || !bmi || !glucose || !bp) {
        alert("Please fill all fields");
        return;
    }

    let data = {
        age: parseInt(age),
        bmi: parseInt(bmi),
        glucose: parseInt(glucose),
        blood_pressure: parseInt(bp)
    };

    // 🔥 CONNECT TO BACKEND (IMPORTANT)
    fetch("https://cyberbullying-leaderboard.onrender.com", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    })
    .then(response => response.json())
    .then(result => {

        document.getElementById("result").innerHTML =
            `
            Prediction: ${result.prediction} <br><br>
            Model Accuracy: ${result.accuracy} <br>
            F1 Score: ${result.f1_score}
            `;
    })
    .catch(error => {
        console.error("Error:", error);
        alert("Backend not connected properly");
    });
}
</script>

</body>
</html>
