<!DOCTYPE html>
<html>
<head>
  <title>Leaderboard</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
    }
    table {
      margin: 20px auto;
      border-collapse: collapse;
      width: 70%;
      background: white;
    }
    th, td {
      padding: 12px;
      border: 1px solid #ddd;
    }
    th {
      background: #333;
      color: white;
    }
    tr:nth-child(even) {
      background: #f2f2f2;
    }
    h1 {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h1>🏆 Leaderboard</h1>

<table id="leaderboard">
  <thead>
    <tr>
      <th>Rank</th>
      <th>Submission</th>
      <th>Accuracy (%)</th>
      <th>F1 Score</th>
      <th>Date</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
fetch("leaderboard.json")
  .then(res => res.json())
  .then(data => {

    // remove baseline for ranking
    const filtered = data.filter(x => x.submission !== "BASELINE");

    // sort by f1
    filtered.sort((a, b) => b.f1_score - a.f1_score);

    const table = document.querySelector("#leaderboard tbody");

    filtered.forEach((row, index) => {
      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${index + 1}</td>
        <td>${row.submission}</td>
        <td>${row.accuracy}</td>
        <td>${row.f1_score}</td>
        <td>${row.date}</td>
      `;

      table.appendChild(tr);
    });

  })
  .catch(err => {
    console.error("Error loading leaderboard:", err);
  });
</script>

</body>
</html>
