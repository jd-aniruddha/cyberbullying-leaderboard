name: Auto Grader

on:
  pull_request_target:
    paths:
      - 'submissions/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  grade:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout base repo (safe)
      - name: Checkout base repo
        uses: actions/checkout@v5

      # ✅ Checkout PR code separately
      - name: Checkout PR submission
        uses: actions/checkout@v5
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          path: pr_repo

      # 🔄 Copy submission into main repo
      - name: Copy submission file
        run: |
          cp pr_repo/submissions/*.csv submissions/

      # 📦 Install dependencies
      - name: Install dependencies
        run: pip install pandas scikit-learn

      # ▶️ Run grader
      - name: Run grader
        run: python grader.py

      # 💾 Commit leaderboard
      - name: Commit leaderboard
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "bot@github.com"
          git checkout main
          git add leaderboard.json
          git commit -m "Update leaderboard" || echo "No changes"
          git push origin main

      # 💬 Comment result on PR
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('leaderboard.json', 'utf8'));

            // pick submission (not baseline)
            const latest = data.find(x => x.submission !== "BASELINE");

            const message = `📊 Results\n\nAccuracy: ${latest.accuracy}%\nF1 Score: ${latest.f1_score}`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });
